<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add CSS and JS to Thymeleaf</title>
    <script type="text/javascript" th:src="@{/js/hello.js}" defer></script>
    <link th:href="@{/css/main.css}" rel="stylesheet"/>

</head>
<body>
<div align="center">
    <h2>Styled Heading</h2>
    <p>
        This is text on which we want to apply <strong>very special</strong> styling.
    </p>
    <!-- 1. Utilizing the new .info-container style -->
    <div class="info-container" style="max-width: 500px; text-align: left;">
        <p>Welcome to the Practice Section!</p>

        <!-- 2. Executing the new showTime function -->
        <button type="button" th:onclick="showTime()">Show Current Time</button>

        <!-- 3. Executing the new toggleTheme function -->
        <button type="button" th:onclick="toggleTheme()">Switch Light/Dark Mode</button>
    </div>
    <button type="button" th:onclick="greeting()">Click Me!!</button>
</div>
</body>
</html>
